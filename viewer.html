<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calculus Fennicus — reader</title>
<meta name="description" content="Embedded, deep-linkable reader for Calculus Fennicus (Finnish and English PDFs). Page or continuous view, full-text search, and links to any section, theorem or definition by its LaTeX label.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#eceef1;--chrome:#fff;--chrome-2:#f5f5f7;--ink:#1a1f36;--soft:#4a5568;--muted:#718096;--border:#e5e7eb;--accent:#4f46e5;--accent-soft:#eef2ff;--warn:#d97706;--sh:0 1px 3px rgba(15,23,42,.08)}
[data-theme=slate]{--bg:#0b1020;--chrome:#161b22;--chrome-2:#1e242c;--ink:#e7ecf2;--soft:#cbd5e1;--muted:#94a3b8;--border:#2a323c;--accent:#818cf8;--accent-soft:rgba(129,140,248,.16);--sh:0 1px 3px rgba(0,0,0,.4)}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;overflow:hidden}
a{color:var(--accent);text-decoration:none}
.vtop{flex:0 0 auto;display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:7px 12px;background:var(--chrome);border-bottom:1px solid var(--border);box-shadow:var(--sh);z-index:5}
.back{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:13px;color:var(--accent);background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:9px;padding:6px 11px}
.title{font-family:"Newsreader",Georgia,serif;font-weight:700;font-size:15px;white-space:nowrap}
.spacer{flex:1 1 auto}
.seg{display:inline-flex;align-items:center;gap:2px;background:var(--chrome-2);border:1px solid var(--border);border-radius:9px;padding:3px}
.seg button{border:0;background:transparent;color:var(--soft);font:600 12.5px/1 inherit;padding:6px 9px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.seg button.active{background:var(--chrome);color:var(--accent);box-shadow:var(--sh)}
.seg button:disabled{opacity:.4;cursor:default}
.pagebox{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--soft)}
.pagebox input{width:52px;text-align:right;font:600 13px "JetBrains Mono",monospace;border:1px solid var(--border);border-radius:6px;padding:5px 7px;background:var(--chrome);color:var(--ink)}
.search{display:inline-flex;align-items:center;gap:4px;background:var(--chrome-2);border:1px solid var(--border);border-radius:9px;padding:2px 4px 2px 9px;min-width:170px}
.search svg{width:14px;height:14px;color:var(--muted);flex:0 0 auto}
.search input{border:0;background:transparent;color:var(--ink);font:500 13px inherit;padding:6px 2px;width:100%;outline:none}
.search .sbtn{border:0;background:transparent;color:var(--soft);cursor:pointer;font-size:13px;padding:5px 7px;border-radius:6px}
.search .sbtn:disabled{opacity:.35;cursor:default}
.search .scount{font-size:11.5px;color:var(--muted);white-space:nowrap;padding:0 3px;min-width:20px;text-align:center}
.loc{font-size:12.5px;color:var(--muted);max-width:26ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.loc b{color:var(--soft)}
.copybtn{font-weight:600;font-size:12.5px;color:var(--accent);background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);border-radius:8px;padding:6px 11px;cursor:pointer}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:600;font-size:12.5px;color:var(--soft);background:var(--chrome-2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;text-decoration:none}
.iconbtn:hover{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 35%,transparent)}
.iconbtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#stage{flex:1 1 auto;overflow:auto;padding:20px 0 60px;overflow-anchor:none;scroll-behavior:smooth}
#pages{margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:14px;overflow-anchor:none}
.page{position:relative;background:#fff;box-shadow:0 2px 12px rgba(15,23,42,.16);border-radius:2px;overflow-anchor:none}
.page canvas{display:block;border-radius:2px}
.page .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#c2c8d2;font:500 13px "JetBrains Mono",monospace}
.page.flash::after{content:"";position:absolute;inset:0;box-shadow:0 0 0 3px var(--accent) inset;border-radius:2px;pointer-events:none;animation:fade 2.4s forwards}
@keyframes fade{0%,50%{opacity:1}100%{opacity:0}}
.hl{position:absolute;background:rgba(255,206,0,.45);border-radius:2px;pointer-events:none;mix-blend-mode:multiply;z-index:1}
.hl.cur{background:rgba(255,145,0,.55)}
/* selectable text layer (transparent glyphs positioned over the canvas) */
.page .textLayer{position:absolute;inset:0;overflow:clip;line-height:1;text-align:initial;transform-origin:0 0;z-index:2;forced-color-adjust:none;text-size-adjust:none;-webkit-text-size-adjust:none}
.page .textLayer span,.page .textLayer br{position:absolute;white-space:pre;cursor:text;transform-origin:0 0;color:transparent}
.page .textLayer span.markedContent{top:0;height:0}
.page .textLayer .endOfContent{position:absolute;inset:0;z-index:-1;cursor:default;user-select:none}
.page .textLayer ::selection{background:rgba(79,70,229,.30)}
/* clickable internal/external links (transparent overlays over the canvas) */
.page .linkLayer{position:absolute;inset:0;z-index:3;pointer-events:none}
.page .linkLayer a{position:absolute;pointer-events:auto;cursor:pointer;border-radius:2px}
.page .linkLayer a:hover{background:rgba(79,70,229,.16);box-shadow:0 0 0 1px rgba(79,70,229,.35)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);font-size:13px;font-weight:600;padding:9px 16px;border-radius:20px;opacity:0;transition:.25s;pointer-events:none;z-index:9}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.err{margin:40px auto;max-width:520px;background:var(--chrome);border:1px solid var(--border);border-radius:12px;padding:22px;font-size:14px;color:var(--soft)}
.loading{position:fixed;left:0;right:0;bottom:0;top:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:color-mix(in srgb,var(--bg) 78%,transparent);backdrop-filter:blur(2px);z-index:6}
.loading.on{display:flex}
.loading .spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading .lmsg{font-size:13.5px;font-weight:600;color:var(--soft)}
.loading .bar{width:190px;height:6px;background:var(--chrome-2);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.loading .bar>i{display:block;height:100%;width:0;background:var(--accent);transition:width .2s}
.loading .bar.indet>i{width:35%;animation:indet 1.1s ease-in-out infinite}
@keyframes indet{0%{margin-left:-35%}100%{margin-left:100%}}
@media(max-width:900px){.title,.loc{display:none}}
@media(max-width:680px){.search{min-width:120px}}
</style>
</head>
<body>
<div class="vtop">
  <a class="back" href="index.html"><span>←</span> Calculus Fennicus</a>
  <span class="title">Reader</span>
  <div class="seg" role="group" aria-label="Language">
    <button id="doc-en" class="active" onclick="app.setDoc('en')">EN</button>
    <button id="doc-fi" onclick="app.setDoc('fi')">FI</button>
  </div>
  <div class="seg" role="group" aria-label="View mode">
    <button id="mode-single" class="active" onclick="app.setMode('single')" title="One page at a time">▭ Page</button>
    <button id="mode-cont" onclick="app.setMode('continuous')" title="Continuous scroll">☰ Scroll</button>
  </div>
  <div class="pagebox"><button class="seg" style="border:1px solid var(--border)" onclick="app.rel(-1)" aria-label="Previous page">‹</button>
    <input id="pageinput" inputmode="numeric" value="1" aria-label="Page"> <span id="pagetotal">/ –</span>
    <button class="seg" style="border:1px solid var(--border)" onclick="app.rel(1)" aria-label="Next page">›</button></div>
  <div class="seg"><button onclick="app.zoom(-1)" aria-label="Zoom out">−</button><button onclick="app.zoom(1)" aria-label="Zoom in">+</button></div>
  <div class="search" role="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input id="searchinput" type="search" placeholder="Search text…" autocomplete="off" aria-label="Search the book">
    <button class="sbtn" id="s-prev" onclick="app.searchStep(-1)" disabled aria-label="Previous match">‹</button>
    <span class="scount" id="s-count"></span>
    <button class="sbtn" id="s-next" onclick="app.searchStep(1)" disabled aria-label="Next match">›</button>
  </div>
  <span class="loc" id="loc"></span>
  <span class="spacer"></span>
  <a class="loc" href="links.html" style="color:var(--accent)">Link directory ↗</a>
  <a class="iconbtn" id="dlpdf" href="calculus-en.pdf" download title="Download this PDF to your device" onclick="app.trackDownload()">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>PDF</a>
  <button class="copybtn" onclick="app.copyLink()">Copy link</button>
</div>
<div id="stage"><div id="pages"></div><div class="err" id="err" style="display:none"></div></div>
<div class="loading" id="loading"><div class="spin"></div><div class="lmsg" id="loadmsg">Loading…</div><div class="bar indet" id="loadbarwrap"><i id="loadbar"></i></div></div>
<div class="toast" id="toast"></div>

<script type="module">
import * as pdfjsLib from './vendor/pdfjs/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = './vendor/pdfjs/pdf.worker.min.mjs';

const DOCS = {
  en: { pdf: ['calculus-en.pdf', '../en/calculus.pdf'], labels: 'labels-en.json' },
  fi: { pdf: ['calculus-fi.pdf', '../fi/calculus.pdf'], labels: 'labels-fi.json' },
};
const $ = (id) => document.getElementById(id);
const stage = $('stage'), pagesEl = $('pages');
const st = {
  doc: 'en', pdf: null, pdfUrl: '', labels: {}, numPages: 0, curPage: 1,
  zoom: 0, pageOffset: 0, sections: [], target: null,
  mode: 'single', baseW: 612, baseH: 792,
  rendered: new Map(), tasks: new Map(), observer: null, renderId: 0,
  textCache: new Map(), search: { q: '', matches: [], idx: -1, running: false },
};
try { st.mode = localStorage.getItem('cf_mode') === 'continuous' ? 'continuous' : 'single'; } catch (e) {}
const printed = (phys) => Math.max(1, phys - st.pageOffset);
const physical = (pr) => Math.min(st.numPages || 9999, pr + st.pageOffset);
const clampP = (p) => Math.max(1, Math.min(st.numPages, p));

// MyPublicAnalytics — the beacon (window.mypa) is inlined into this page only in
// the published build, so track() is a silent no-op locally. `embedded` marks
// events fired while the reader runs inside the landing-page iframe.
const EMBEDDED = (function () { try { return window.self !== window.top; } catch (e) { return true; } })();
function track(ev, extra) { try { if (window.mypa && window.mypa.send) window.mypa.send(ev, Object.assign({ page: 'viewer', doc: st.doc, embedded: EMBEDDED }, extra || {})); } catch (e) {} }
function toast(m) { const t = $('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1700); }
const LANGNAME = { en: 'English', fi: 'Finnish' };
function setLoading(on, msg) {
  const l = $('loading'); if (!l) return;
  if (on) {
    const bar = document.querySelector('.vtop'); if (bar) l.style.top = Math.round(bar.getBoundingClientRect().bottom) + 'px';
    $('loadmsg').textContent = msg || 'Loading…'; $('loadbar').style.width = '0%'; $('loadbarwrap').classList.add('indet');
    l.classList.add('on');
  } else l.classList.remove('on');
}
function setLoadProgress(loaded, total) {
  const w = $('loadbarwrap'); if (!w) return;
  if (total && total > 0) { w.classList.remove('indet'); $('loadbar').style.width = Math.min(99, Math.round(loaded / total * 100)) + '%'; }
}
function showErr(h) { const e = $('err'); e.style.display = 'block'; e.innerHTML = h; }
async function pickUrl(cands) { for (const u of cands) { try { const r = await fetch(u, { method: 'HEAD' }); if (r.ok) return u; } catch (e) {} } return cands[0]; }

function scaleFor(unscaledW) {
  const avail = Math.min(stage.clientWidth - 40, 1050);
  return (avail / unscaledW) * Math.pow(1.14, st.zoom);
}

// ---------- deep-link resolution ----------
async function resolveDestPage(name) { try { const d = await st.pdf.getDestination(name); if (!d) return null; return (await st.pdf.getPageIndex(d[0])) + 1; } catch (e) { return null; } }
async function computeOffset() {
  st.pageOffset = 0;
  for (const k in st.labels) { const L = st.labels[k]; if ((L.kind === 'section' || L.kind === 'chapter') && L.dest && L.page > 0) { const ph = await resolveDestPage(L.dest); if (ph) { st.pageOffset = ph - L.page; return; } } }
}
function nearestSection(phys) { const pr = phys - st.pageOffset; let best = null; for (const s of st.sections) { if (s.page <= pr) best = s; else break; } return best; }
function updateLoc(meta) { const L = meta || nearestSection(st.curPage); $('loc').innerHTML = L ? ('<b>§' + (L.ref || '') + '</b> ' + (L.title || '')) : ''; }
function parseHash() {
  const h = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  const doc = h.get('doc') === 'fi' ? 'fi' : 'en';
  const label = h.get('label'), dest = h.get('dest'), page = parseInt(h.get('page'), 10);
  let target = null; if (label) target = { label }; else if (dest) target = { dest }; else if (page) target = { page };
  return { doc, target };
}
function writeHash() { const t = st.target || {}; const p = new URLSearchParams(); p.set('doc', st.doc); if (t.label) p.set('label', t.label); else if (t.dest) p.set('dest', t.dest); else p.set('page', String(t.page || printed(st.curPage))); history.replaceState(null, '', '#' + p.toString()); }

// ---------- loading ----------
async function loadDoc(doc) {
  st.doc = doc;
  $('doc-en').classList.toggle('active', doc === 'en'); $('doc-fi').classList.toggle('active', doc === 'fi');
  setLoading(true, 'Loading the ' + (LANGNAME[doc] || '') + ' edition…');
  st.textCache.clear(); clearSearch();
  try { st.labels = await (await fetch(DOCS[doc].labels)).json(); } catch (e) { st.labels = {}; }
  if (st.pdf) { try { await st.pdf.destroy(); } catch (e) {} }
  const url = await pickUrl(DOCS[doc].pdf);
  st.pdfUrl = url;
  const dl = $('dlpdf'); if (dl) { dl.href = url; dl.setAttribute('download', doc === 'fi' ? 'Calculus-Fennicus-FI.pdf' : 'Calculus-Fennicus-EN.pdf'); }
  const task = pdfjsLib.getDocument({ url, disableAutoFetch: true, disableStream: false });
  task.onProgress = (p) => { if (p) setLoadProgress(p.loaded, p.total); };
  try { st.pdf = await task.promise; }
  catch (e) { setLoading(false); showErr(`Could not load the PDF (<code>${url}</code>).<br>Locally, run <code>make ${doc}</code> first, or use the published site.`); return false; }
  st.numPages = st.pdf.numPages;
  const vp1 = (await st.pdf.getPage(1)).getViewport({ scale: 1 });
  st.baseW = vp1.width; st.baseH = vp1.height;
  st.sections = Object.keys(st.labels).map(k => st.labels[k]).filter(L => L.kind === 'section' || L.kind === 'chapter').sort((a, b) => a.page - b.page);
  await computeOffset();
  $('pagetotal').textContent = '/ ' + printed(st.numPages);
  buildStage();
  return true;
}

// ---------- rendering (shared .page element with canvas + highlights) ----------
async function renderInto(el, phys) {
  phys = clampP(phys);
  const rid = ++st.renderId; el._rid = rid;
  const page = await st.pdf.getPage(phys);
  if (el._rid !== rid && st.mode === 'single') return;
  const scale = scaleFor(st.baseW);
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const vp = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = Math.floor(vp.width * dpr); canvas.height = Math.floor(vp.height * dpr);
  canvas.style.width = Math.floor(vp.width) + 'px'; canvas.style.height = Math.floor(vp.height) + 'px';
  const ctx = canvas.getContext('2d', { alpha: false });
  const task = page.render({ canvasContext: ctx, viewport: vp, transform: dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null });
  st.tasks.set(phys, task);
  try { await task.promise; } catch (e) { return; } finally { st.tasks.delete(phys); }
  if (el._rid !== rid && st.mode === 'single') return;
  el.style.width = Math.floor(vp.width) + 'px'; el.style.height = Math.floor(vp.height) + 'px';
  el.innerHTML = ''; el.appendChild(canvas); el.dataset.rendered = '1';
  if (st.search.q) await drawHighlights(el, page, vp, phys);
  await addTextLayer(el, page, vp, scale, rid);
  await addLinkLayer(el, page, vp, rid);
}
// selectable/copyable text layer via PDF.js
async function addTextLayer(el, page, vp, scale, rid) {
  try {
    const div = document.createElement('div'); div.className = 'textLayer';
    div.style.setProperty('--scale-factor', scale);
    div.style.setProperty('--total-scale-factor', scale);
    const tl = new pdfjsLib.TextLayer({ textContentSource: page.streamTextContent({ includeMarkedContent: true }), container: div, viewport: vp });
    await tl.render();
    if (el._rid === rid || st.mode !== 'single') el.appendChild(div);
  } catch (e) {}
}
// clickable link layer: internal destinations resolve via our own navigation
async function destToPhysical(dest) {
  try { const d = typeof dest === 'string' ? await st.pdf.getDestination(dest) : dest; if (!d) return null; return (await st.pdf.getPageIndex(d[0])) + 1; } catch (e) { return null; }
}
async function addLinkLayer(el, page, vp, rid) {
  try {
    const annots = await page.getAnnotations({ intent: 'display' });
    const links = annots.filter(a => a.subtype === 'Link' && (a.dest || a.url));
    if (!links.length) return;
    const layer = document.createElement('div'); layer.className = 'linkLayer';
    for (const a of links) {
      const r = vp.convertToViewportRectangle(a.rect);
      const left = Math.min(r[0], r[2]), top = Math.min(r[1], r[3]);
      const w = Math.abs(r[2] - r[0]), h = Math.abs(r[3] - r[1]);
      const link = document.createElement('a');
      link.style.cssText = `left:${left}px;top:${top}px;width:${w}px;height:${h}px`;
      if (a.url) { link.href = a.url; link.target = EMBEDDED ? '_top' : '_blank'; link.rel = 'noopener'; link.title = a.url; }
      else {
        link.href = '#';
        link.addEventListener('click', async (ev) => {
          ev.preventDefault();
          const p = await destToPhysical(a.dest);
          if (p) { st.target = { page: printed(p) }; await goToPage(p, true); writeHash(); }
        });
      }
      layer.appendChild(link);
    }
    if (el._rid === rid || st.mode !== 'single') el.appendChild(layer);
  } catch (e) {}
}
async function drawHighlights(el, page, vp, phys) {
  el.querySelectorAll('.hl').forEach(n => n.remove());
  const q = st.search.q; if (!q) return;
  const isCur = st.search.cur === phys;
  const tc = await page.getTextContent();
  for (const it of tc.items) {
    const s = (it.str || '').toLowerCase(); if (!s.includes(q)) continue;
    const tx = pdfjsLib.Util.transform(vp.transform, it.transform);
    const fh = Math.hypot(tx[2], tx[3]); const w = (it.width || 0) * vp.scale;
    const d = document.createElement('div'); d.className = 'hl' + (isCur ? ' cur' : '');
    d.style.cssText = `left:${tx[4]}px;top:${tx[5] - fh}px;width:${Math.max(w, 6)}px;height:${fh * 1.12}px`;
    el.appendChild(d);
  }
}

function buildStage() {
  if (st.observer) { st.observer.disconnect(); st.observer = null; }
  st.rendered.clear();
  pagesEl.innerHTML = '';
  $('mode-single').classList.toggle('active', st.mode === 'single');
  $('mode-cont').classList.toggle('active', st.mode === 'continuous');
  if (st.mode === 'single') {
    const el = document.createElement('div'); el.className = 'page'; el.id = 'single-page';
    el.style.width = Math.round(st.baseW * scaleFor(st.baseW)) + 'px'; el.style.height = Math.round(st.baseH * scaleFor(st.baseW)) + 'px';
    pagesEl.appendChild(el);
  } else {
    const s = scaleFor(st.baseW), w = Math.round(st.baseW * s), h = Math.round(st.baseH * s);
    const frag = document.createDocumentFragment();
    for (let i = 1; i <= st.numPages; i++) {
      const d = document.createElement('div'); d.className = 'page'; d.dataset.page = i;
      d.style.width = w + 'px'; d.style.height = h + 'px'; d.innerHTML = '<div class="ph">' + printed(i) + '</div>';
      frag.appendChild(d);
    }
    pagesEl.appendChild(frag);
    st.observer = new IntersectionObserver(onIntersect, { root: stage, rootMargin: '800px 0px' });
    pagesEl.querySelectorAll('.page').forEach(n => st.observer.observe(n));
  }
}
function onIntersect(entries) {
  for (const e of entries) {
    const i = +e.target.dataset.page;
    if (e.isIntersecting) { if (!st.rendered.has(i)) { st.rendered.set(i, 1); renderInto(e.target, i); } }
    else if (st.rendered.has(i)) { const t = st.tasks.get(i); if (t) try { t.cancel(); } catch (x) {} el_reset(e.target, i); st.rendered.delete(i); }
  }
}
function el_reset(el, i) { el.innerHTML = '<div class="ph">' + printed(i) + '</div>'; el.style.height = Math.round(st.baseH * scaleFor(st.baseW)) + 'px'; delete el.dataset.rendered; }
function updateCurFromScroll() {
  if (st.mode !== 'continuous') return;
  const first = pagesEl.querySelector('.page'); if (!first) return;
  const stride = Math.round(st.baseH * scaleFor(st.baseW)) + 14;
